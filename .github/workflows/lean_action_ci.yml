name: Verify Lean Proofs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lean:
    name: Build Lean Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache .lake directory
        uses: actions/cache@v4
        with:
          path: .lake
          key: ${{ runner.os }}-lake-${{ hashFiles('lean-toolchain', 'lakefile.toml') }}
          restore-keys: |
            ${{ runner.os }}-lake-

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build project
        run: lake build

      - name: Check for sorry
        run: |
          if grep -r "sorry" --include="*.lean" .; then
            echo "::warning::Incomplete proofs (sorry) remain in the project."
          fi